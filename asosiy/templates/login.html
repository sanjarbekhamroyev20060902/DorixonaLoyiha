{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow p-4">
            <h3 class="text-center text-success mb-4">Tizimga Kirish</h3>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn btn-green w-100 mt-3">Kirish</button>
            </form>
            <p class="text-center mt-3">
                Akkauntingiz yo'qmi? <a href="{% url 'register' %}" class="text-success fw-bold">Ro'yxatdan o'tish</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
